<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="daftar.css">
</head>

<body>
    <div class="daftar">
        <from class="daftar-form">
            <h2>Silahkan daftar</h2>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" required placeholder="Masukkan username dengan benar">
            </div>
            <div class="input-group">
                <label for="Email">email</label>
                <input type="text" name="email" id="email" required placeholder="admin@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" required placeholder="Password minimal 8 character">
            </div>
           <button class="button-daftar">Daftar</button>
            <div class="sudah-punya-akun"><span>Sudah punya akun?<a href="login.html">Kembali</a></span>
            </div>
        </from>
    </div>
</body>

</html>
